<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Ads - Admin Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0f0f23; color: #fff; }
    .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; }
    .header .status { font-size: 12px; color: #4ecdc4; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #1a1a2e; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #2a2a4a; }
    .stat-card .number { font-size: 36px; font-weight: bold; color: #4ecdc4; }
    .stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }
    .tablets { background: #1a1a2e; border-radius: 12px; padding: 20px; border: 1px solid #2a2a4a; }
    .tablets h2 { font-size: 16px; margin-bottom: 16px; color: #ccc; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px; color: #888; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #2a2a4a; }
    td { padding: 10px; font-size: 13px; border-bottom: 1px solid #1a1a3a; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
    .badge-active { background: #1b4332; color: #52b788; }
    .badge-sleeping { background: #3a2e0a; color: #ffd166; }
    .badge-offline { background: #3a1a1a; color: #ef476f; }
    .btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; }
    .btn-blue { background: #0077b6; color: #fff; }
    .btn-red { background: #d00000; color: #fff; }
    .btn-green { background: #2d6a4f; color: #fff; }
    .actions { display: flex; gap: 6px; }
    #log { background: #111; border-radius: 8px; padding: 12px; margin-top: 20px; font-family: monospace; font-size: 11px; max-height: 200px; overflow-y: auto; color: #4ecdc4; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>🚕 Smart Mobility Ads - Dashboard</h1>
      <div class="status" id="socketStatus">Connecting...</div>
    </div>
    <div style="font-size:12px;color:#888" id="clock"></div>
  </div>

  <div class="container">
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="number" id="statTotal">-</div>
        <div class="label">Total Tablets</div>
      </div>
      <div class="stat-card">
        <div class="number" id="statActive" style="color:#52b788">-</div>
        <div class="label">Active</div>
      </div>
      <div class="stat-card">
        <div class="number" id="statSleeping" style="color:#ffd166">-</div>
        <div class="label">Sleeping</div>
      </div>
      <div class="stat-card">
        <div class="number" id="statOffline" style="color:#ef476f">-</div>
        <div class="label">Offline</div>
      </div>
    </div>

    <!-- Tablets -->
    <div class="tablets">
      <h2>📱 Tablets</h2>
      <table>
        <thead>
          <tr>
            <th>Tablet ID</th>
            <th>Location</th>
            <th>Status</th>
            <th>Battery</th>
            <th>Last Seen</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tabletList">
          <tr><td colspan="6" style="text-align:center;color:#666">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Log -->
    <div id="log"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const API = window.location.origin;
    const socket = io(API, { transports: ['websocket', 'polling'] });

    function log(msg) {
      const el = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      el.innerHTML = `[${time}] ${msg}\n` + el.innerHTML;
    }

    // Clock
    setInterval(() => {
      document.getElementById('clock').textContent = new Date().toLocaleString('th-TH');
    }, 1000);

    // Socket
    socket.on('connect', () => {
      document.getElementById('socketStatus').textContent = '🟢 Connected';
      socket.emit('register_tablet', { tabletId: 'ADMIN_DASHBOARD', device: 'admin' });
      log('✅ Connected to server');
      loadStats();
    });

    socket.on('disconnect', () => {
      document.getElementById('socketStatus').textContent = '🔴 Disconnected';
    });

    socket.on('tablet_status_updated', (data) => {
      log(`📊 ${data.tabletId}: battery=${data.battery}% video=${data.currentVideo}`);
      loadStats();
    });

    // Load stats
    async function loadStats() {
      try {
        const res = await fetch(`${API}/api/dashboard/stats`);
        const data = await res.json();
        document.getElementById('statTotal').textContent = data.total || 0;
        document.getElementById('statActive').textContent = data.active || 0;
        document.getElementById('statSleeping').textContent = data.sleeping || 0;
        document.getElementById('statOffline').textContent = data.offline || 0;

        // Load tablet list
        loadTablets();
      } catch (e) {
        log('❌ Failed to load stats');
      }
    }

    async function loadTablets() {
      try {
        const res = await fetch(`${API}/api/tablets/all`);
        const data = await res.json();
        const tbody = document.getElementById('tabletList');

        if (!data.tablets || data.tablets.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#666">No tablets</td></tr>';
          return;
        }

        tbody.innerHTML = data.tablets.map(t => `
          <tr>
            <td><strong>${t.tablet_id}</strong></td>
            <td>${t.location || '-'}</td>
            <td><span class="badge badge-${t.status}">${t.status}</span></td>
            <td>${t.battery_level || 0}%</td>
            <td>${t.last_seen ? new Date(t.last_seen).toLocaleString('th-TH') : '-'}</td>
            <td class="actions">
              <button class="btn btn-blue" onclick="sendCommand('${t.tablet_id}', 'reboot')">Reboot</button>
              <button class="btn btn-green" onclick="sendCommand('${t.tablet_id}', 'wake')">Wake</button>
            </td>
          </tr>
        `).join('');
      } catch (e) {
        log('❌ Failed to load tablets');
      }
    }

    function sendCommand(tabletId, type) {
      socket.emit('admin_command', { tabletId, type });
      log(`📤 Command sent: ${type} → ${tabletId}`);
    }

    // Auto refresh
    setInterval(loadStats, 30000);
  </script>
</body>
</html>
