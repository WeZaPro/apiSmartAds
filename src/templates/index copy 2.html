<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Widget Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="bg-slate-900 font-sans min-h-screen flex items-center justify-center p-4 md:p-8 text-slate-100"
  >
    <div
      class="w-full max-w-4xl bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 p-6"
    >
      <h1
        class="text-2xl font-bold mb-6 text-center bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent"
      >
        📺 My Video Dashboard
      </h1>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div
          class="video-card bg-slate-950 p-4 rounded-xl border border-slate-700 hover:border-blue-500 cursor-pointer transition duration-300 group"
          data-url="https://www.youtube.com/watch?v=YU2nse4Ohe8&list=RDGMEMCMFH2exzjBeE_zAHHJOdxgVMYU2nse4Ohe8&start_radio=1"
          data-title="แนะนำภาพรวมโปรเจกต์ (YouTube)"
        >
          <div
            class="aspect-video bg-slate-900 rounded-lg flex items-center justify-center relative overflow-hidden mb-3"
          >
            <span
              class="text-sm text-slate-400 group-hover:scale-110 transition duration-300"
              >▶ เล่นวิดีโอ 1</span
            >
          </div>
          <h3
            class="font-medium text-slate-200 group-hover:text-blue-400 transition"
          >
            คลิปที่ 1: สรุปข้อมูลระบบ
          </h3>
        </div>

        <div
          class="video-card bg-slate-950 p-4 rounded-xl border border-slate-700 hover:border-blue-500 cursor-pointer transition duration-300 group"
          data-url="https://www.youtube.com/watch?v=kGiW19S3QXI&list=RDGMEMCMFH2exzjBeE_zAHHJOdxgVMYU2nse4Ohe8&index=4"
          data-title="ฟีเจอร์ใหม่ประจำสัปดาห์ (TikTok)"
        >
          <div
            class="aspect-video bg-slate-900 rounded-lg flex items-center justify-center relative overflow-hidden mb-3"
          >
            <span
              class="text-sm text-slate-400 group-hover:scale-110 transition duration-300"
              >▶ เล่นวิดีโอ 2</span
            >
          </div>
          <h3
            class="font-medium text-slate-200 group-hover:text-blue-400 transition"
          >
            คลิปที่ 2: อัปเดตฟีเจอร์ใหม่
          </h3>
        </div>

        <div
          class="video-card bg-slate-950 p-4 rounded-xl border border-slate-700 hover:border-blue-500 cursor-pointer transition duration-300 group"
          data-url="https://www.youtube.com/watch?v=1pBDn5cbLJw&list=RDGMEMCMFH2exzjBeE_zAHHJOdxgVMYU2nse4Ohe8&index=10"
          data-title="คู่มือการใช้งานเริ่มต้น"
        >
          <div
            class="aspect-video bg-slate-900 rounded-lg flex items-center justify-center relative overflow-hidden mb-3"
          >
            <span
              class="text-sm text-slate-400 group-hover:scale-110 transition duration-300"
              >▶ เล่นวิดีโอ 3</span
            >
          </div>
          <h3
            class="font-medium text-slate-200 group-hover:text-blue-400 transition"
          >
            คลิปที่ 3: แนะนำการใช้งาน
          </h3>
        </div>

        <div
          class="video-card bg-slate-950 p-4 rounded-xl border border-slate-700 hover:border-blue-500 cursor-pointer transition duration-300 group"
          data-url="https://www.youtube.com/watch?v=00NbqbB2TtA&list=RDGMEMCMFH2exzjBeE_zAHHJOdxgVMYU2nse4Ohe8&index=17"
          data-title="ถาม-ตอบ ปัญหาเทคนิค"
        >
          <div
            class="aspect-video bg-slate-900 rounded-lg flex items-center justify-center relative overflow-hidden mb-3"
          >
            <span
              class="text-sm text-slate-400 group-hover:scale-110 transition duration-300"
              >▶ เล่นวิดีโอ 4</span
            >
          </div>
          <h3
            class="font-medium text-slate-200 group-hover:text-blue-400 transition"
          >
            คลิปที่ 4: Q&A ไขข้อข้องใจ
          </h3>
        </div>
      </div>
    </div>

    <div
      id="videoModal"
      class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300"
    >
      <div
        class="bg-slate-900 w-full max-w-3xl rounded-2xl border border-slate-700 overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300"
        id="modalContent"
      >
        <div
          class="bg-slate-950 px-6 py-4 flex justify-between items-center border-b border-slate-800"
        >
          <h2
            id="modalTitle"
            class="text-lg font-semibold text-slate-200 truncate mr-4"
          >
            กำลังโหลดวิดีโอ...
          </h2>
          <button
            id="closeModalBtn"
            class="text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 p-2 rounded-full transition"
          >
            ✕
          </button>
        </div>

        <div class="p-4 bg-slate-950 flex justify-center items-center">
          <div
            id="videoWrapper"
            class="w-full aspect-video bg-black rounded-xl overflow-hidden transition-all duration-300"
          >
            <iframe
              id="modalPlayer"
              class="w-full h-full"
              allowfullscreen
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            >
            </iframe>
          </div>
        </div>
      </div>
    </div>

    <script>
      const videoCards = document.querySelectorAll(".video-card");
      const videoModal = document.getElementById("videoModal");
      const modalContent = document.getElementById("modalContent");
      const modalPlayer = document.getElementById("modalPlayer");
      const modalTitle = document.getElementById("modalTitle");
      const closeModalBtn = document.getElementById("closeModalBtn");
      const videoWrapper = document.getElementById("videoWrapper");

      // ฟังก์ชันแปลงลิงก์เป็น Embed URL เหมือนเดิม
      function getEmbedUrl(url) {
        try {
          const urlObj = new URL(url);
          if (
            urlObj.hostname.includes("youtube.com") ||
            urlObj.hostname.includes("youtu.be")
          ) {
            let videoId = "";
            if (urlObj.hostname.includes("youtu.be"))
              videoId = urlObj.pathname.split("/")[1];
            else if (urlObj.pathname.includes("shorts"))
              videoId = urlObj.pathname.split("/")[2];
            else videoId = urlObj.searchParams.get("v");

            if (videoId) {
              videoWrapper.className =
                "w-full aspect-video bg-black rounded-xl overflow-hidden";
              return `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            }
          }
          if (urlObj.hostname.includes("tiktok.com")) {
            const pathParts = urlObj.pathname.split("/");
            const videoId = pathParts[pathParts.length - 1];
            if (videoId && !isNaN(videoId)) {
              videoWrapper.className =
                "w-[320px] h-[560px] max-w-full bg-black rounded-xl overflow-hidden";
              return `https://www.tiktok.com/embed/v2/${videoId}`;
            }
          }
          return null;
        } catch (e) {
          return null;
        }
      }

      // ฟังก์ชันเปิด Modal
      function openModal(url, title) {
        const embedUrl = getEmbedUrl(url);
        if (!embedUrl) {
          alert("ลิงก์วิดีโอไม่ถูกต้องหรือไม่รองรับ");
          return;
        }

        modalTitle.innerText = title;
        modalPlayer.src = embedUrl;

        // แสดง Modal พร้อม Animation ลื่น ๆ
        videoModal.classList.remove("hidden");
        setTimeout(() => {
          videoModal.classList.remove("opacity-0");
          modalContent.classList.remove("scale-95");
          modalContent.classList.add("scale-100");
        }, 10);
      }

      // ฟังก์ชันปิด Modal
      function closeModal() {
        videoModal.classList.add("opacity-0");
        modalContent.classList.remove("scale-100");
        modalContent.classList.add("scale-95");

        setTimeout(() => {
          videoModal.classList.add("hidden");
          modalPlayer.src = ""; // ตัดสัญญาณเสียง/วิดีโอเมื่อปิดหน้าต่าง
        }, 300);
      }

      // ผูก Event ให้กับการ์ดทุกใบ
      videoCards.forEach((card) => {
        card.addEventListener("click", () => {
          const url = card.getAttribute("data-url");
          const title = card.getAttribute("data-title");
          openModal(url, title);
        });
      });

      // ผูก Event ให้ปุ่มปิด
      closeModalBtn.addEventListener("click", closeModal);

      // คลิกพื้นที่ว่างนอก Modal ให้ปิดหน้าต่างได้เช่นกัน
      videoModal.addEventListener("click", (e) => {
        if (e.target === videoModal) closeModal();
      });
    </script>
  </body>
</html>
