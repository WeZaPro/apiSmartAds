<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Widget MP4 Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="bg-slate-900 font-sans min-h-screen flex items-center justify-center p-4 md:p-8 text-slate-100"
  >
    <div
      class="w-full max-w-5xl bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 p-6"
    >
      <h1
        class="text-2xl font-bold mb-6 text-center bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent"
      >
        🎥 Video Dashboard (MP4 Auto-Close)-New
      </h1>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div
          class="video-card bg-slate-950 rounded-xl border border-slate-700 hover:border-blue-500 cursor-pointer transition duration-300 group overflow-hidden"
          data-url="https://api.happyevvip.com/videos/1782386699949_video_A1.mp4"
          data-title="วิดีโอสาธิตระบบ A1"
          data-cover="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=600&auto=format&fit=crop"
        >
          <div
            class="aspect-video w-full bg-slate-900 relative overflow-hidden"
          >
            <img
              src=""
              class="card-img w-full h-full object-cover transition duration-500 group-hover:scale-105"
              alt="Cover"
            />
            <div
              class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-100 group-hover:bg-black/20 transition"
            >
              <span
                class="bg-blue-600/90 text-white p-3 rounded-full text-xl shadow-lg transform group-hover:scale-110 transition"
                >▶</span
              >
            </div>
          </div>
          <div class="p-4">
            <h3
              class="font-medium text-slate-200 group-hover:text-blue-400 transition truncate"
            >
              คลิปที่ 1: วิดีโอทดสอบ A1
            </h3>
          </div>
        </div>

        <div
          class="video-card bg-slate-950 rounded-xl border border-slate-700 hover:border-blue-500 cursor-pointer transition duration-300 group overflow-hidden"
          data-url="https://api.happyevvip.com/videos/1782386806216_video_A2.mp4"
          data-title="วิดีโอสาธิตระบบ A2"
          data-cover="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=600&auto=format&fit=crop"
        >
          <div
            class="aspect-video w-full bg-slate-900 relative overflow-hidden"
          >
            <img
              src=""
              class="card-img w-full h-full object-cover transition duration-500 group-hover:scale-105"
              alt="Cover"
            />
            <div
              class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-100 group-hover:bg-black/20 transition"
            >
              <span
                class="bg-blue-600/90 text-white p-3 rounded-full text-xl shadow-lg transform group-hover:scale-110 transition"
                >▶</span
              >
            </div>
          </div>
          <div class="p-4">
            <h3
              class="font-medium text-slate-200 group-hover:text-blue-400 transition truncate"
            >
              คลิปที่ 2: วิดีโอทดสอบ A2
            </h3>
          </div>
        </div>

        <div
          class="video-card bg-slate-950 rounded-xl border border-slate-700 hover:border-blue-500 cursor-pointer transition duration-300 group overflow-hidden"
          data-url="https://api.happyevvip.com/videos/1782386866760_video_A3.mp4"
          data-title="วิดีโอสาธิตระบบ A3"
          data-cover="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=600&auto=format&fit=crop"
        >
          <div
            class="aspect-video w-full bg-slate-900 relative overflow-hidden"
          >
            <img
              src=""
              class="card-img w-full h-full object-cover transition duration-500 group-hover:scale-105"
              alt="Cover"
            />
            <div
              class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-100 group-hover:bg-black/20 transition"
            >
              <span
                class="bg-blue-600/90 text-white p-3 rounded-full text-xl shadow-lg transform group-hover:scale-110 transition"
                >▶</span
              >
            </div>
          </div>
          <div class="p-4">
            <h3
              class="font-medium text-slate-200 group-hover:text-blue-400 transition truncate"
            >
              คลิปที่ 3: วิดีโอทดสอบ A3
            </h3>
          </div>
        </div>

        <div
          class="video-card bg-slate-950 rounded-xl border border-slate-700 hover:border-blue-500 cursor-pointer transition duration-300 group overflow-hidden"
          data-url="https://api.happyevvip.com/videos/1782386944022_video_B1.mp4"
          data-title="วิดีโอสาธิตระบบ A4"
          data-cover="https://images.unsplash.com/photo-1551434678-e076c223a692?w=600&auto=format&fit=crop"
        >
          <div
            class="aspect-video w-full bg-slate-900 relative overflow-hidden"
          >
            <img
              src=""
              class="card-img w-full h-full object-cover transition duration-500 group-hover:scale-105"
              alt="Cover"
            />
            <div
              class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-100 group-hover:bg-black/20 transition"
            >
              <span
                class="bg-blue-600/90 text-white p-3 rounded-full text-xl shadow-lg transform group-hover:scale-110 transition"
                >▶</span
              >
            </div>
          </div>
          <div class="p-4">
            <h3
              class="font-medium text-slate-200 group-hover:text-blue-400 transition truncate"
            >
              คลิปที่ 4: วิดีโอทดสอบ A4
            </h3>
          </div>
        </div>
      </div>
    </div>

    <div
      id="videoModal"
      class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex flex-col justify-between hidden opacity-0 transition-opacity duration-300"
    >
      <div
        class="w-full bg-slate-950/80 px-6 py-4 flex justify-between items-center border-b border-slate-800 backdrop-blur"
      >
        <h2
          id="modalTitle"
          class="text-xl font-semibold text-slate-200 truncate mr-4"
        >
          กำลังโหลด...
        </h2>
        <button
          id="closeModalBtn"
          class="text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 text-lg px-4 py-2 rounded-xl transition"
        >
          ✕ ปิดหน้าต่าง
        </button>
      </div>

      <div class="flex-1 w-full flex items-center justify-center bg-black">
        <video
          id="html5Player"
          class="w-full h-full max-h-screen object-contain"
          controls
          autoplay
        ></video>
      </div>

      <div class="w-full text-center py-2 text-xs text-slate-500 bg-slate-950">
        ระบบจะปิดหน้าต่างอัตโนมัติเมื่อวิดีโอนี้เล่นจบ
      </div>
    </div>

    <script>
      const videoModal = document.getElementById("videoModal");
      const html5Player = document.getElementById("html5Player");
      const modalTitle = document.getElementById("modalTitle");
      const closeModalBtn = document.getElementById("closeModalBtn");

      // โหลดรูปหน้าปกใส่การ์ดเมื่อเปิดหน้าเว็บ
      document.querySelectorAll(".video-card").forEach((card) => {
        const coverUrl = card.getAttribute("data-cover");
        const imgTag = card.querySelector(".card-img");
        if (coverUrl && imgTag) {
          imgTag.src = coverUrl;
        }
      });

      // ฟังก์ชันเปิด Full Width Modal และเล่นวิดีโอ .mp4
      function openModal(url, title) {
        modalTitle.innerText = title;
        html5Player.src = url; // ใส่ลิงก์ตรงของวิดีโอ (.mp4)
        html5Player.load();

        // แสดงหน้าต่างแบบค่อย ๆ เฟดขึ้น
        videoModal.classList.remove("hidden");
        setTimeout(() => {
          videoModal.classList.remove("opacity-0");
          html5Player.play().catch((error) => {
            console.log(
              "Autoplay อาจโดนเบราว์เซอร์บล็อกชั่วคราว คลิกปุ่มเล่นเองได้เลยครับ",
              error
            );
          });
        }, 10);
      }

      // ฟังก์ชันปิด Modal และหยุดวิดีโอ
      function closeModal() {
        videoModal.classList.add("opacity-0");
        setTimeout(() => {
          videoModal.classList.add("hidden");
          html5Player.pause(); // สั่งหยุดเล่นวิดีโอ
          html5Player.src = ""; // ล้างซอร์สเพื่อไม่ให้โหลดข้อมูลต่อเบื้องหลัง
        }, 300);
      }

      // --- ฟีเจอร์เด็ด: ตรวจจับวิดีโอเล่นจบแล้วสั่งปิดอัตโนมัติ ---
      html5Player.addEventListener("ended", () => {
        console.log("วิดีโอไฟล์ .mp4 เล่นจบแล้ว ทำการปิดหน้าต่างอัตโนมัติ");
        closeModal();
      });

      // ลงทะเบียนคลิกที่การ์ดทุกใบ
      document.querySelectorAll(".video-card").forEach((card) => {
        card.addEventListener("click", () => {
          const url = card.getAttribute("data-url");
          const title = card.getAttribute("data-title");
          openModal(url, title);
        });
      });

      // ปุ่มกดปิดแบบ Manual
      closeModalBtn.addEventListener("click", closeModal);
    </script>
  </body>
</html>
