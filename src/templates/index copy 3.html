    <div
      id="videoModal"
      class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex flex-col justify-between hidden opacity-0 transition-opacity duration-300"
    >
      <div
        class="w-full bg-slate-950/80 px-6 py-4 flex justify-between items-center border-b border-slate-800 backdrop-blur"
      >
        <h2
          id="modalTitle"
          class="text-xl font-semibold text-slate-200 truncate mr-4"
        >
          กำลังโหลด...
        </h2>
        <button
          id="closeModalBtn"
          class="text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 text-lg px-4 py-2 rounded-xl transition"
        >
          ✕ ปิดหน้าต่าง
        </button>
      </div>

      <div class="flex-1 w-full flex items-center justify-center bg-black">
        <div id="playerContainer" class="w-full h-full">
          <div id="ytPlayer"></div>
        </div>
      </div>

      <div class="w-full text-center py-2 text-xs text-slate-500 bg-slate-950">
        ระบบจะปิดหน้าต่างอัตโนมัติเมื่อวิดีโอนี้เล่นจบ
      </div>
    </div>

    <script>
      let ytPlayerInstance = null;
      let activeVideoId = null;

      // โหลดรูปหน้าปกใส่การ์ดเมื่อเปิดหน้าเว็บ
      document.querySelectorAll(".video-card").forEach((card) => {
        const coverUrl = card.getAttribute("data-cover");
        const imgTag = card.querySelector(".card-img");
        if (coverUrl && imgTag) {
          imgTag.src = coverUrl;
        }
      });

      // ฟังก์ชันแกะเฉพาะ Video ID จากลิงก์ YouTube
      function getYouTubeId(url) {
        try {
          const urlObj = new URL(url);
          if (
            urlObj.hostname.includes("youtube.com") ||
            urlObj.hostname.includes("youtu.be")
          ) {
            if (urlObj.hostname.includes("youtu.be"))
              return urlObj.pathname.split("/")[1];
            if (urlObj.pathname.includes("shorts"))
              return urlObj.pathname.split("/")[2];
            return urlObj.searchParams.get("v");
          }
          return null;
        } catch (e) {
          return null;
        }
      }

      // เมื่อ YouTube API พร้อมใช้งาน
      function onYouTubeIframeAPIReady() {
        // ฟังก์ชันหลักพร้อมใช้งานแล้วเบื้องหลัง
      }

      // ฟังก์ชันสร้างตัวเล่นวิดีโอและเฝ้าดูสถานะ (รวม Auto Close)
      function initAndPlayVideo(videoId) {
        // หากมีอินสแตนซ์เก่า คลีนทิ้งก่อนเพื่อเปิดคลิปใหม่
        if (ytPlayerInstance) {
          ytPlayerInstance.destroy();
        }

        ytPlayerInstance = new YT.Player("ytPlayer", {
          width: "100%",
          height: "100%",
          videoId: videoId,
          playerVars: {
            autoplay: 1,
            rel: 0,
            modestbranding: 1,
          },
          events: {
            onStateChange: onPlayerStateChange,
          },
        });
      }

      // ดักจับสถานะของตัวเล่นวิดีโอ
      function onPlayerStateChange(event) {
        // YT.PlayerState.ENDED มีค่าเท่ากับ 0 แปลว่า "เล่นจบ"
        if (event.data === YT.PlayerState.ENDED) {
          console.log("วิดีโอเล่นจบแล้ว ทำการปิด Modal อัตโนมัติ");
          closeModal();
        }
      }

      // ฟังก์ชันเปิด Full Width Modal
      function openModal(url, title) {
        const videoId = getYouTubeId(url);
        if (!videoId) {
          alert(
            "ขออภัย! ระบบเวอร์ชัน Auto-Close นี้พัฒนาขึ้นสำหรับลิงก์ YouTube ครับ"
          );
          return;
        }

        document.getElementById("modalTitle").innerText = title;

        // แสดงหน้าต่างแบบค่อย ๆ เฟดขึ้น
        const modal = document.getElementById("videoModal");
        modal.classList.remove("hidden");
        setTimeout(() => {
          modal.classList.remove("opacity-0");
          // เริ่มโหลดและสตรีมมิ่งวิดีโอพอร์ทลงตัวเล่นพรีเมียม
          initAndPlayVideo(videoId);
        }, 10);
      }

      // ฟังก์ชันปิด Modal
      function closeModal() {
        const modal = document.getElementById("videoModal");
        modal.classList.add("opacity-0");

        setTimeout(() => {
          modal.classList.add("hidden");
          if (ytPlayerInstance) {
            ytPlayerInstance.stopVideo(); // หยุดวิดีโอทันที
          }
        }, 300);
      }

      // ลงทะเบียนคลิกที่การ์ดทุกใบ
      document.querySelectorAll(".video-card").forEach((card) => {
        card.addEventListener("click", () => {
          const url = card.getAttribute("data-url");
          const title = card.getAttribute("data-title");
          openModal(url, title);
        });
      });

      // ปุ่มกดปิดแบบ Manual
      document
        .getElementById("closeModalBtn")
        .addEventListener("click", closeModal);
    </script>
